<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Evan Schweizer | Loading...</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0d1117;
        color: #c9d1d9;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 24px;
        overflow-y: auto;
      }

      .terminal {
        width: min(720px, 100%);
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 32px;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      .header {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #484f58;
      }

      .line {
        margin: 10px 0;
        line-height: 1.5;
      }

      .green {
        color: #7ee787;
      }

      .blue {
        color: #58a6ff;
      }

      .dim {
        color: #8b949e;
      }

      .progress-container {
        margin-top: 10px;
        font-size: 18px;
      }

      .progress {
        letter-spacing: 2px;
      }

      .spacer {
        height: 8px;
        margin: 12px 0;
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 18px;
        background: #c9d1d9;
        animation: blink 1s infinite;
      }

      @media (max-height: 700px) {
        body {
          align-items: flex-start;
          padding-top: 20px;
        }
      }

      @media (max-width: 600px) {
        .terminal {
          padding: 20px;
          font-size: 14px;
        }
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="terminal">
      <div class="header">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div id="terminal-output"></div>
    </div>

    <script>
      const terminal = document.getElementById("terminal-output");

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function scrollToBottom() {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth",
        });
      }

      async function typeText(text, className = "", speed = 35) {
        const line = document.createElement("div");
        line.className = "line " + className;
        terminal.appendChild(line);

        for (const char of text) {
          line.textContent += char;
          scrollToBottom();
          await sleep(speed);
        }

        return line;
      }

      async function addLine(text, className = "") {
        const line = document.createElement("div");
        line.className = "line " + className;
        line.textContent = text;

        terminal.appendChild(line);
        scrollToBottom();

        await sleep(300);
      }

      function addBreak() {
        const spacer = document.createElement("div");
        spacer.className = "line spacer";
        terminal.appendChild(spacer);
        scrollToBottom();
      }

      async function progressBar() {
        const container = document.createElement("div");
        container.className = "progress-container";
        terminal.appendChild(container);

        let value = 0;
        const target = 100;

        while (value < target) {
          const baseStep = Math.random() * 6 + 2;
          const wobble = Math.random() > 0.35 ? Math.random() * 2 : -Math.random() * 1.5;
          const step = Math.max(1, baseStep + wobble);

          value = Math.min(target, value + step);

          if (value >= 92) {
            value = target;
          }

          const blocks = Math.floor(value / 10);
          container.textContent =
            "█".repeat(blocks) +
            "░".repeat(10 - blocks) +
            ` ${Math.round(value)}%`;

          scrollToBottom();
          await sleep(180);
        }
      }

      async function boot() {
        await typeText("$ ollama run evan-schweizer-v1", "green");

        addBreak();
        await sleep(700);

        await addLine("pulling model manifest...", "dim");
        await addLine("fetching architecture layers...", "dim");

        await sleep(500);
        await addLine("⠋ Loading weights...");

        addBreak();
        await sleep(500);

        await addLine("Architecture:");
        await addLine("  ├── Statistics");
        await addLine("  ├── Data Science");
        await addLine("  ├── Machine Learning");
        await addLine("  ├── Generative AI");
        await addLine("  └── Computer Vision");

        addBreak();
        await sleep(500);

        await addLine("Initializing knowledge base...");
        await addLine("✓ Professional experience loaded", "green");
        await addLine("✓ Projects indexed", "green");
        await addLine("✓ Portfolio embeddings generated", "green");

        addBreak();
        await sleep(700);

        await addLine("Generating evanschweizer.com...", "blue");
        await addLine("Context window:");
        await addLine("8,421 tokens processed");

        addBreak();
        await sleep(500);

        await addLine("Model status:");
        await progressBar();

        await sleep(800);

        await addLine("Response:", "green");
        await typeText('"Website coming soon."');

        const cursor = document.createElement("span");
        cursor.className = "cursor";
        terminal.appendChild(cursor);
        scrollToBottom();
      }

      boot();
    </script>
  </body>
</html>
